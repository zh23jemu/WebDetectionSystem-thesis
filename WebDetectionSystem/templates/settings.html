{% extends "base.html" %}

{% block content %}
<h2><i class="fas fa-cog"></i> 系统设置</h2>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card p-4">
            <h5 class="mb-3">核心参数配置</h5>
            <form method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">当前检测模型</label>
                    <div class="input-group">
                        <input type="text" class="form-control" value="{{ model }}" disabled>
                        <span class="input-group-text"><i class="fas fa-file-code"></i></span>
                    </div>
                    <div class="form-text text-muted">正在使用的权重文件</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">上传新模型 (.pt)</label>
                    <input class="form-control" type="file" name="model_file" accept=".pt">
                    <div class="form-text">上传后系统将自动切换至新模型。</div>
                </div>

                <hr>

                <div class="mb-3">
                    <label class="form-label">置信度阈值 (Conf Threshold)</label>
                    <div class="d-flex align-items-center">
                        <input type="range" class="form-range flex-grow-1 me-3" name="conf_threshold"
                               min="0.1" max="0.9" step="0.05" value="{{ conf }}"
                               oninput="this.nextElementSibling.value = this.value">
                        <output>{{ conf }}</output>
                    </div>
                    <div class="form-text">阈值越高，检测越严格（漏检增加）；阈值越低，误检可能增加。</div>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-save"></i> 保存设置
                </button>
            </form>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card p-4 bg-light">
            <h5><i class="fas fa-info-circle"></i> 说明</h5>
            <p><strong>置信度阈值：</strong> YOLO 模型输出的每一个检测框都有一个概率值。低于此设置的框将被忽略。默认建议 0.25。</p>
            <p><strong>模型更换：</strong> 只能上传 `.pt` 格式的 PyTorch 权重文件。上传成功后，系统会立即在下一次检测中使用新模型。</p>
        </div>
    </div>
</div>
{% endblock %}
