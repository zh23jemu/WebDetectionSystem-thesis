{% extends "base.html" %}

{% block content %}
<h2><i class="fas fa-id-card"></i> 个人中心</h2>
<div class="card p-4 mt-3" style="max-width: 500px;">
    <h5>修改密码</h5>
    <form method="POST">
        <div class="mb-3">
            <label>旧密码</label>
            <input type="password" name="old_password" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>新密码</label>
            <input type="password" name="new_password" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>确认新密码</label>
            <input type="password" name="confirm_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-warning w-100">确认修改</button>
    </form>
</div>
{% endblock %}
