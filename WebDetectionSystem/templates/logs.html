{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2><i class="fas fa-chart-bar"></i> 日志与报表</h2>
    <a href="{{ url_for('export_data') }}" class="btn btn-success">
        <i class="fas fa-file-excel"></i> 导出 Excel
    </a>
</div>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card p-4 h-100">
            <h5><i class="fas fa-chart-line"></i> 近7天检测趋势</h5>
            <div style="height: 250px;">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card p-4 h-100">
            <h5><i class="fas fa-chart-pie"></i> 缺陷类别占比</h5>
            <div style="height: 250px;">
                <canvas id="statsChart"></canvas>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-4">
        <div class="card bg-primary text-white p-3">
            <h3>{{ today_count }}</h3>
            <small>今日检测量</small>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card bg-info text-white p-3">
            <h3>{{ work_time }}</h3>
            <small>累计工作时长</small>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // 1. 缺陷占比图
    const statsData = {{ stats | tojson }};
    if (statsData.length > 0) {
        new Chart(document.getElementById('statsChart'), {
            type: 'doughnut',
            data: {
                labels: statsData.map(row => row[0]),
                datasets: [{
                    data: statsData.map(row => row[1]),
                    backgroundColor: ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0']
                }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    // 2. [新增] 趋势图
    const trendLabels = {{ trend_labels | tojson }};
    const trendData = {{ trend_data | tojson }};

    new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
            labels: trendLabels,
            datasets: [{
                label: '每日检测量',
                data: trendData,
                borderColor: '#4bc0c0',
                tension: 0.1,
                fill: true
            }]
        },
        options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
    });
</script>
{% endblock %}
