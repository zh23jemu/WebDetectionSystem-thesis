{% extends "base.html" %}

{% block content %}
<h2><i class="fas fa-users-cog"></i> 用户管理</h2>

<div class="card p-4 mt-3">
    <h5>添加新用户</h5>
    <form method="POST" class="row g-3">
        <input type="hidden" name="action" value="add">
        <div class="col-md-4">
            <input type="text" name="username" class="form-control" placeholder="用户名" required>
        </div>
        <div class="col-md-4">
            <input type="text" name="password" class="form-control" placeholder="初始密码" required>
        </div>
        <div class="col-md-2">
            <select name="role" class="form-select">
                <option value="user">普通用户</option>
                <option value="admin">管理员</option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-success w-100">添加</button>
        </div>
    </form>
</div>

<div class="card mt-4">
    <div class="card-body">
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>角色</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.id }}</td>
                    <td>{{ user.username }}</td>
                    <td>
                        <span class="badge {{ 'bg-warning text-dark' if user.role == 'admin' else 'bg-info' }}">
                            {{ user.role }}
                        </span>
                    </td>
                    <td>
                        {% if user.username != 'admin' %}
                        <form method="POST" style="display:inline;">
                            <input type="hidden" name="action" value="delete">
                            <input type="hidden" name="user_id" value="{{ user.id }}">
                            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('确定删除？')">删除</button>
                        </form>
                        {% else %}
                        <span class="text-muted">不可删除</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
